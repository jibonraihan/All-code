<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Info Table</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
h1 {
  text-align: center;
  color: #333;
}
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}
th, td {
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
th {
  cursor: pointer;
  background: #f7f7f7;
}
th:hover {
  background: #e0e0e0;
}
tr:hover {
  background: #f1f1f1;
}
a {
  color: #007bff;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
.pagination {
  margin-top: 20px;
  text-align: center;
}
.pagination button {
  margin: 2px;
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #007bff;
  color: #fff;
}
.pagination button.disabled {
  background: #ccc;
  cursor: not-allowed;
}
.not-found {
  color: red;
  font-weight: bold;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Student Info Table</h1>
  <input type="text" id="searchBox" placeholder="Search by ID or Name" oninput="filterTable()">
  <table id="studentTable">
    <thead>
      <tr>
        <th onclick="sortTable(0)">ID &#x25B2;&#x25BC;</th>
        <th onclick="sortTable(1)">Name &#x25B2;&#x25BC;</th>
        <th>Mobile</th>
        <th>Address</th>
        <th>Blood</th>
        <th>Facebook</th>
        <th>Email</th>
        <th>Handle</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="pagination" id="pagination"></div>
  <p class="not-found" id="notFound" style="display:none;">Student not available</p>
</div>

<script>
let students = [];
let currentPage = 1;
const rowsPerPage = 5;
let currentSort = { col: -1, asc: true };
const invalidIds = [3,7,12,15,25,26,28];

// Load JSON data
fetch('students.json')
  .then(res => res.json())
  .then(data => {
    students = data;
     console.log("Loaded students:", students);
    displayTable();
  })
  .catch(err => console.error('Error loading JSON:', err));

// Filter function according to C++ logic
function filterStudents() {
  const search = document.getElementById('searchBox').value.trim().toLowerCase();
  
  if(search === '') return students;

  const num = parseInt(search);
  if(!isNaN(num)) {
    if(num > 30 || invalidIds.includes(num)) return [];
    return students.filter(s => s.id === num);
  }

  return students.filter(s => s.name.toLowerCase().includes(search));
}

// Display table with pagination
function displayTable() {
  const tbody = document.querySelector("#studentTable tbody");
  tbody.innerHTML = '';
  
  const filtered = filterStudents();
  const start = (currentPage-1) * rowsPerPage;
  const paginated = filtered.slice(start, start + rowsPerPage);

  if(paginated.length === 0) {
    document.getElementById('notFound').style.display = 'block';
  } else {
    document.getElementById('notFound').style.display = 'none';
  }

  paginated.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${s.id < 10 ? '20232410400'+s.id : '2023241040'+s.id}</td>
      <td>${s.name}</td>
      <td>${s.mobile}</td>
      <td>${s.address}</td>
      <td>${s.blood}</td>
      <td><a href="${s.fb_link}" target="_blank">${s.fb_link}</a></td>
      <td>${s.email}</td>
      <td>${s.handle}</td>
    `;
    tbody.appendChild(tr);
  });

  renderPagination(filtered.length);
}

// Sort table by column
function sortTable(colIndex) {
  const filtered = filterStudents();
  const asc = (currentSort.col === colIndex) ? !currentSort.asc : true;
  currentSort = { col: colIndex, asc };

  filtered.sort((a,b) => {
    let valA = colIndex === 0 ? a.id : a.name.toLowerCase();
    let valB = colIndex === 0 ? b.id : b.name.toLowerCase();
    if(valA < valB) return asc ? -1 : 1;
    if(valA > valB) return asc ? 1 : -1;
    return 0;
  });

  students = filtered.concat(students.filter(s => !filtered.includes(s)));
  currentPage = 1;
  displayTable();
}

// Pagination buttons
function renderPagination(totalRows) {
  const totalPages = Math.ceil(totalRows / rowsPerPage);
  const container = document.getElementById('pagination');
  container.innerHTML = '';

  if(totalPages <= 1) return;

  for(let i=1;i<=totalPages;i++) {
    const btn = document.createElement('button');
    btn.textContent = i;
    if(i === currentPage) btn.classList.add('disabled');
    btn.onclick = () => { currentPage=i; displayTable(); };
    container.appendChild(btn);
  }
}

// Search box input
function filterTable() {
  currentPage = 1;
  displayTable();
}
</script>

</body>
</html>
