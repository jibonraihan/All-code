<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Ghibli Photo Editor</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .canvas-container {
            position: relative;
            margin: 20px 0;
            text-align: center;
            border: 3px solid #3498db;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .upload-btn {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
        }

        .download-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
        }

        .filter-btn {
            background: linear-gradient(45deg, #ffa726, #fb8c00);
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: inline-block;
        }

        .upload-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .info {
            background: rgba(52, 152, 219, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
            border: 2px solid #3498db;
        }

        .ghibli-effects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .effect-card {
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #e74c3c;
            transition: transform 0.3s ease;
        }

        .effect-card:hover {
            transform: scale(1.05);
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-element {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-element" style="top: 10%; left: 10%; font-size: 60px;">🌸</div>
        <div class="floating-element" style="top: 20%; right: 15%; font-size: 50px;">🍃</div>
        <div class="floating-element" style="bottom: 30%; left: 20%; font-size: 40px;">✨</div>
        <div class="floating-element" style="bottom: 20%; right: 10%; font-size: 55px;">🦋</div>
    </div>

    <div class="container">
        <h1>🌟 Studio Ghibli Photo Magic 🌟</h1>
        
        <div class="info">
            <p>Transform your photos into beautiful Studio Ghibli-style artwork! Upload your image and apply magical filters to create dreamy, colorful scenes.</p>
        </div>

        <div class="controls">
            <label for="imageInput" class="upload-label">
                📸 Upload Your Photo
            </label>
            <input type="file" id="imageInput" accept="image/*">
            <button class="download-btn" onclick="downloadImage()" id="downloadBtn" style="display: none;">
                💾 Download Ghibli Art
            </button>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="ghibli-effects">
            <div class="effect-card">
                <h3>🌈 Dreamy Colors</h3>
                <button class="filter-btn" onclick="applyGhibliFilter('dreamy')">Apply</button>
            </div>
            <div class="effect-card">
                <h3>🌸 Soft Pastels</h3>
                <button class="filter-btn" onclick="applyGhibliFilter('pastel')">Apply</button>
            </div>
            <div class="effect-card">
                <h3>🌅 Warm Sunset</h3>
                <button class="filter-btn" onclick="applyGhibliFilter('sunset')">Apply</button>
            </div>
            <div class="effect-card">
                <h3>🌿 Nature Boost</h3>
                <button class="filter-btn" onclick="applyGhibliFilter('nature')">Apply</button>
            </div>
            <div class="effect-card">
                <h3>✨ Magical Glow</h3>
                <button class="filter-btn" onclick="applyGhibliFilter('glow')">Apply</button>
            </div>
            <div class="effect-card">
                <h3>🎨 Vintage Film</h3>
                <button class="filter-btn" onclick="applyGhibliFilter('vintage')">Apply</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageInput = document.getElementById('imageInput');
        const downloadBtn = document.getElementById('downloadBtn');
        let originalImageData = null;
        let currentImage = null;

        imageInput.addEventListener('change', handleImageUpload);

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        currentImage = img;
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        downloadBtn.style.display = 'inline-block';
                        
                        // Apply initial background cleaning and basic Ghibli enhancement
                        setTimeout(() => {
                            applyGhibliFilter('dreamy');
                        }, 100);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function applyGhibliFilter(filterType) {
            if (!originalImageData) return;

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                // Apply background softening (reduces prominence of background people)
                const brightness = (r + g + b) / 3;
                const isBackground = brightness > 150 || (r > 100 && g > 100 && b > 100);

                if (isBackground) {
                    // Soften background elements
                    r = Math.min(255, r * 0.8 + 40);
                    g = Math.min(255, g * 0.8 + 40);
                    b = Math.min(255, b * 0.8 + 40);
                }

                switch (filterType) {
                    case 'dreamy':
                        // Enhance greens and add warmth
                        r = Math.min(255, r * 1.1 + 15);
                        g = Math.min(255, g * 1.3 + 20);
                        b = Math.min(255, b * 0.9 + 10);
                        break;
                    
                    case 'pastel':
                        // Soft pastel tones
                        r = Math.min(255, r * 0.8 + 50);
                        g = Math.min(255, g * 0.9 + 40);
                        b = Math.min(255, b * 1.1 + 35);
                        break;
                    
                    case 'sunset':
                        // Warm sunset colors
                        r = Math.min(255, r * 1.2 + 30);
                        g = Math.min(255, g * 1.1 + 20);
                        b = Math.min(255, b * 0.8 + 5);
                        break;
                    
                    case 'nature':
                        // Boost natural greens
                        if (g > r && g > b) {
                            g = Math.min(255, g * 1.4);
                            r = Math.min(255, r * 0.9);
                        }
                        break;
                    
                    case 'glow':
                        // Add magical glow
                        const glow = Math.sin(i * 0.01) * 20;
                        r = Math.min(255, r + glow);
                        g = Math.min(255, g + glow);
                        b = Math.min(255, b + glow);
                        break;
                    
                    case 'vintage':
                        // Vintage film look
                        r = Math.min(255, r * 1.1 + 20);
                        g = Math.min(255, g * 1.0 + 15);
                        b = Math.min(255, b * 0.9 + 10);
                        break;
                }

                data[i] = r;
                data[i + 1] = g;
                data[i + 2] = b;
            }

            ctx.putImageData(imageData, 0, 0);
            
            // Add subtle vignette effect
            addVignette();
        }

        function addVignette() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.sqrt(centerX * centerX + centerY * centerY);
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(0.7, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.3)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function downloadImage() {
            if (!canvas) return;
            
            const link = document.createElement('a');
            link.download = 'ghibli-style-photo.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Add some sparkle effects
        function addSparkles() {
            const sparkles = ['✨', '🌟', '💫', '⭐'];
            for (let i = 0; i < 5; i++) {
                const sparkle = document.createElement('div');
                sparkle.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
                sparkle.style.position = 'absolute';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.fontSize = Math.random() * 20 + 10 + 'px';
                sparkle.style.animation = 'float ' + (Math.random() * 3 + 2) + 's ease-in-out infinite';
                sparkle.style.pointerEvents = 'none';
                sparkle.style.zIndex = '1000';
                document.body.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, 5000);
            }
        }

        // Add sparkles periodically
        setInterval(addSparkles, 3000);
    </script>
</body>
</html>
