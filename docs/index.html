<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Info Table</title>

<style>
body {
  font-family: Arial;
  background: #f0f2f5;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h1 { text-align:center; }

input {
  width:100%;
  padding:10px;
  margin:10px 0;
}

table {
  width:100%;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

th { background:#eee; cursor:pointer; }

.not-found {
  color:red;
  text-align:center;
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <h1>Student Info Table</h1>

  <input 
    type="text" 
    id="searchBox" 
    placeholder="Search by ID or Name" 
    oninput="filterTable()"
  >

  <table id="studentTable">
    <thead>
      <tr>
        <th onclick="sortTable(0)">ID ▲▼</th>
        <th onclick="sortTable(1)">Name ▲▼</th>
        <th>Mobile</th>
        <th>Address</th>
        <th>Blood</th>
        <th>Facebook</th>
        <th>Email</th>
        <th>Handle</th>
      </tr>
    </thead>

    <tbody id="tbody"></tbody>
  </table>

  <p class="not-found" id="notFound">Student not available</p>
</div>

<!-- JS MUST be here -->
<script>

let students = [];
let filteredStudents = [];

// Load JSON
fetch("./students.json")
.then(res => {
    if (!res.ok) throw new Error("JSON not found");
    return res.json();
})
.then(data => {
    students = data;
    filteredStudents = data;
    display(filteredStudents);
})
.catch(err => {
    console.error(err);
    document.getElementById("notFound").style.display = "block";
});

// Display table
function display(data) {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if (data.length === 0) {
        document.getElementById("notFound").style.display = "block";
        return;
    }

    document.getElementById("notFound").style.display = "none";

    data.forEach(s => {
        tbody.innerHTML += `
        <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.mobile}</td>
            <td>${s.address}</td>
            <td>${s.blood}</td>
            <td>${s.fb_link !== "Not available" ? `<a href="${s.fb_link}" target="_blank">Link</a>` : "Not available"}</td>
            <td>${s.email}</td>
            <td>${s.handle}</td>
        </tr>`;
    });
}

// Search filter
function filterTable() {
    let val = document.getElementById("searchBox").value.trim().toLowerCase();

    if (val === "") {
        filteredStudents = students;
    } else {
        filteredStudents = students.filter(s =>
            s.name.toLowerCase().includes(val) ||
            s.id.toString().includes(val)
        );
    }

    display(filteredStudents);
}

// Sort
let sortState = { col: null, asc: true };

function sortTable(colIndex) {
    const asc = (sortState.col === colIndex) ? !sortState.asc : true;
    sortState = { col: colIndex, asc };

    filteredStudents.sort((a, b) => {
        let valA = colIndex === 0 ? a.id : a.name.toLowerCase();
        let valB = colIndex === 0 ? b.id : b.name.toLowerCase();

        if (valA < valB) return asc ? -1 : 1;
        if (valA > valB) return asc ? 1 : -1;
        return 0;
    });

    display(filteredStudents);
}

</script>

</body>
</html>
